<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/styles/styles.css">


</head>
<body>

    <!-- Nav-var -->
    <header>
        <nav class="navbar_section">
            <div class="navbar_container">
                <div class="container--items">
                    <div class="item--logo">
                        <a href="/" class="casino_logo">Home</a>
                    </div>

                    <div class="item--search">
                        <input type="search" id="search" class="search--input" placeholder="Buscar...">
                    </div>
                </div>
        
                <div class="container_logs">
                    <ul class="list--items">
                        <li class="item--bttns">
                            <a class="bttn login--bttn" href="/login.html">Iniciar sesión</a>
                        </li>
                        <li class="item--bttns">
                            <a class="bttn signin--bttn" href="/sigin.html">Registrarse</a>
                        </li>
                        <li class="item--bttns">
                            <button id="deleteAccountBtn" class="bttn delete--bttn" data-bs-toggle="modal" data-bs-target="#deleteModal" style="display:none">Eliminar cuenta</button>
                        </li>
                        <li class="item--bttns">
                            <a class="nav-link cerrars" href="#" data-bs-toggle="modal" data-bs-target="#logoutModal">
                                <i class="fas fa-sign-out-alt ms-2" style="color: white;" title="Cerrar sesion"></i>
                            </a>
                        </li> 
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>


    <!-- Modal para cerrar sesion -->
    <div class="modal fade" id="logoutModal" tabindex="-1" aria-labelledby="logoutModalLabel" aria-hidden="true">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="logoutModalLabel">Cerrar sesión</h5>
                <button type="button" class="btn-close " data-bs-dismiss="modal" aria-label="Cerrar"></button>
              </div>
              <div class="modal-body">
                ¿Seguro de que deseas cerrar sesión?
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button id="logoutBtn" class="btn btn-custom">Aceptar</button>
              </div>
            </div>
            </div>
        </div>
        </div>
    
    <!-- Modal para eliminar cuenta -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteModalLabel">Eliminar cuenta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <p>Para eliminar tu cuenta, por favor ingresa tu contraseña para confirmar.</p>
                    <div class="mb-3">
                        <label for="deletePassword" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="deletePassword" placeholder="Contraseña">
                        <div id="deleteError" class="text-danger mt-2" style="display:none"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button id="confirmDeleteBtn" class="btn btn-danger">Eliminar cuenta</button>
                </div>
            </div>
        </div>
    </div>

        <div id="game_selector">
            <!-- 
            <a href="/views/blackjack.html" class="games_selector" id="bj_selector">Blackjack</a>
            <a href="/views/poker.html" class="games_selector" id="poker_selector">Poker</a>
            <a href="/views/ruleta.html" class="games_selector" id="ruleta_selector">Ruleta</a>
            -->
    </div>

    

    </main>
        <footer>
            
        </footer>

            crossorigin="anonymous"
        ></script>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
            integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
            crossorigin="anonymous"
        ></script>

        <script src="/deleteAccount.js"></script>
</body>
</html>
