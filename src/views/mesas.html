<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesas · Casino en Linea</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous"/>
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/mesas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div id="nav-bar">
            <a href="/" id="casino_logo">Casino en linea</a>
            <div id="log-bttns">
                <div id="user-zone" style="display:none; align-items:center; gap:14px;">
                    <span id="saldo-display"></span>
                    <a href="/perfil" id="user-avatar" title="Ver perfil"></a>
                    <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#logoutModal">
                        <i class="fas fa-sign-out-alt" style="color:rgba(255,255,255,0.6); font-size:18px;"></i>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <div class="modal fade" id="logoutModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Cerrar sesión</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">¿Seguro que deseas cerrar sesión?</div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-custom" id="confirm-logout">Aceptar</button>
                </div>
            </div>
        </div>
    </div>

    <main id="mesas-main">
        <div id="mesas-header">
            <a href="/" id="back-link"><i class="fas fa-arrow-left"></i> Volver</a>
            <h1 id="mesas-titulo">Selecciona una mesa</h1>
            <p id="mesas-sub">Elige el juego y la mesa en la que quieres jugar</p>
        </div>

        <div id="tabs-juego">
            <button class="tab-btn active" data-juego="blackjack">🃏 Blackjack</button>
            <button class="tab-btn" data-juego="ruleta">🎡 Ruleta</button>
        </div>

        <div id="mesas-grid"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+" crossorigin="anonymous"></script>
    <script src="/views/utils.js"></script>
    <script src="/views/mesas.js"></script>
</body>
</html>
