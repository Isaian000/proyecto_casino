        <div id="nav-bar">

                    <label for="name" class="item--label">Nombre</label>

                <div class="last_name--container">

            </div>

            </div>

            <div class="birthdate_container">
                <label for="" class="item--label">Fecha de Nacimiento</label>
                <select name="" id="day_select" class="date--input day--input" required>
                    <option value="">Dia</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>

                    <option value="12">12</option>

                    <option value="14">14</option>
                    <option value="15">15</option>
                    <option value="16">16</option>
                    <option value="17">17</option>
                    <option value="18">1</option>

                    <option value="20">20</option>
                    <option value="21">21</option>
                    <option value="22">22</option>
                    <option value="23">23</option>
                    <option value="24">24</option>
                    <option value="25">25</option>
                    <option value="26">26</option>
                    <option value="27">27</option>
                    <option value="28">28</option>
                    <option value="29">29</option>
                    <option value="30">30</option>
                    <option value="31">31</option>
                </select>
                <select name="" id="month_select" class="date--input month--input" required>
                    <option value="">Mes</option>
                    <option value="1">Enero</option>
                    <option value="2">Febrero</option>
                    <option value="3">Marzo</option>
                    <option value="4">Abril</option>
                    <option value="5">Mayo</option>
                    <option value="6">Junio</option>
                    <option value="7">Julio</option>
                    <option value="8">Agosto</option>
                    <option value="9">Septiembre</option>
                    <option value="10">Octubre</option>
                    <option value="11">Noviembre</option>
                    <option value="12">Diciembre</option>
                </select>
                <select name="" id="year_select" class="date--input year--input" required>

                    <option value="14">1995</option>
                    <option value="15">1994</option>
                    <option value="16">1993</option>
                    <option value="17">1992</option>
                    <option value="18">1991</option>
                </select>
            </div>
            <div class="items--container">
                <label for="phone_number" class="item--label">Número de telefono</label>
                <input type="text" id="phone_number" name="phone_number" class="input" placeholder="Número de telefono" required>
            </div>
            <div class="items--container">
                <label for="password" class="item--label">Password</label>
                <input type="password" name="password" id="password" class="input" placeholder="Contraseña" class="input" required>
            </div>
            <div class="items--container">
                <input type="submit" value="Registrarse" id="submit" class="submit--item">
            </div>
            <div class="items--cotainer">
                <a href="https://www.google.com/?hl=es_419" class="google-bttn" target="_blank">Acceder con <span>Google</span></a>
